<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>QR Las Palmeras</title>
  <link rel="stylesheet" href="../css/menu.css">
</head>
<body class="qr-admin-page">
  <main class="qr-page">
    <article class="qr-card" id="print-area">
      <h1>Las Palmeras</h1>
      <p>Pan &amp; Cafe</p>
      <div id="qrcode" role="img" aria-label="Codigo QR"></div>
      <p class="qr-scan-text">Escanea para ver la carta</p>
    </article>

    <div class="qr-actions no-print">
      <button type="button" class="btn btn--primary" onclick="window.print()">Imprimir QR</button>
    </div>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/qr.js" defer></script>
</body>
</html>
